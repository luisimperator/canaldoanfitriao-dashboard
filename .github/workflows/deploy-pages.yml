# Publica a demo estática do dashboard no GitHub Pages (branch gh-pages).
# O site roda em modo demo (dados gerados); rotas de API e force-dynamic
# exigem servidor e são removidas só durante este build — o código real fica intacto.
name: Deploy demo (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/host-channel-dashboard-04tz1i
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Remover partes que exigem servidor
        run: |
          rm -rf src/app/api
          grep -rl 'force-dynamic' src/app --include='*.tsx' | xargs -r sed -i '/force-dynamic/d'

      - name: Build estático
        run: STATIC_EXPORT=1 npm run build

      - name: Publicar no branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
